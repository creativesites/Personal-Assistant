name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy-backend:
    name: Deploy backend to ECS
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.ECS_SSH_KEY }}
          port: ${{ secrets.ECS_PORT || 22 }}
          script: |
            set -e
            cd /opt/zuri

            # Pull latest code
            git pull origin main

            # Write .env from GitHub secret
            echo "${{ secrets.PROD_ENV }}" > .env

            # Run pending DB migrations — db/ isn't baked into the api image,
            # so this runs in a throwaway container against the checked-out
            # repo instead. Must happen before the app containers restart so
            # new code never runs against an old schema.
            docker run --rm \
              -v "$(pwd)":/app -w /app \
              --env-file .env \
              node:22-alpine \
              sh -c "npm install pg --no-save --silent && node db/migrate.js"

            # Build updated images
            docker compose -f docker-compose.prod.yml build --no-cache api intelligence whatsapp

            # Restart services
            docker compose -f docker-compose.prod.yml up -d \
              --no-deps --force-recreate api intelligence whatsapp

            # Wait for API to become healthy
            echo "Waiting for API..."
            for i in $(seq 1 30); do
              if curl -sf http://localhost:5500/health > /dev/null 2>&1; then
                echo "API healthy after ${i}s"
                break
              fi
              sleep 2
            done

            # Verify it came up
            curl -sf http://localhost:5500/health || { echo "API health check failed"; exit 1; }

            # Clean up old images
            docker image prune -f

            echo "Deployment complete"
