name: zuri-prod

services:
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redisdata:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET}
      PORT: 3000
      WHATSAPP_SERVICE_URL: http://whatsapp:3001
      INTELLIGENCE_SERVICE_URL: http://intelligence:8000
      CORS_ORIGIN: ${CORS_ORIGIN:-}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health -S 2>&1 | grep -q 'HTTP/' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  whatsapp:
    build:
      context: .
      dockerfile: services/whatsapp/Dockerfile
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      PORT: 3001
      API_URL: http://api:3000
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - wa_sessions:/app/db/sessions
    restart: unless-stopped
    shm_size: '512mb'
    expose:
      - "3001"

  intelligence:
    build:
      context: .
      dockerfile: services/intelligence/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GOOGLE_AI_API_KEY: ${GOOGLE_AI_API_KEY:-}
      DEFAULT_AI_MODEL: ${DEFAULT_AI_MODEL:-gemini/gemini-3.5-flash}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      SERP_API_KEY: ${SERP_API_KEY:-}
      PORT: 8000
      API_URL: http://api:3000
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    expose:
      - "8000"

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "5500:5500"
    volumes:
      - ./nginx.prod.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redisdata:
  wa_sessions:
