name: zuri-prod

services:
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redisdata:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET}
      PORT: 3000
      WHATSAPP_SERVICE_URL: http://whatsapp:3001
      INTELLIGENCE_SERVICE_URL: http://intelligence:8000
      CORS_ORIGIN: ${CORS_ORIGIN:-}
      MEDIA_DIR: /app/media
      KB_STORAGE_DIR: /app/kb-storage
      DOC_STORAGE_DIR: /app/doc-storage
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    expose:
      - "3000"
    volumes:
      - wa_media:/app/media
      - kb_storage:/app/kb-storage
      - doc_storage:/app/doc-storage
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  whatsapp:
    build:
      context: .
      dockerfile: services/whatsapp/Dockerfile
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      PORT: 3001
      API_URL: http://api:3000
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET:-}
      INTELLIGENCE_SERVICE_URL: http://intelligence:8000
      MEDIA_DIR: /app/media
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - wa_sessions:/app/db/sessions
      - wa_media:/app/media
    restart: unless-stopped
    expose:
      - "3001"

  intelligence:
    build:
      context: .
      dockerfile: services/intelligence/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GOOGLE_AI_API_KEY: ${GOOGLE_AI_API_KEY:-}
      DEFAULT_AI_MODEL: ${DEFAULT_AI_MODEL:-gemini/gemini-3.5-flash}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      ALIBABA_AI_API_KEY: ${ALIBABA_AI_API_KEY:-}
      ALIBABA_OPENAI_COMPATIBLE_HOST: ${ALIBABA_OPENAI_COMPATIBLE_HOST:-}
      ALIBABA_API_HOST: ${ALIBABA_API_HOST:-}
      ALIBABA_DASHSCOPE_HOST: ${ALIBABA_DASHSCOPE_HOST:-}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      SERP_API_KEY: ${SERP_API_KEY:-}
      PORT: 8000
      API_URL: http://api:3000
      KB_STORAGE_DIR: /app/kb-storage
      DOC_STORAGE_DIR: /app/doc-storage
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    expose:
      - "8000"
    volumes:
      - kb_storage:/app/kb-storage
      - doc_storage:/app/doc-storage

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "5500:5500"
    volumes:
      - ./nginx.prod.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redisdata:
  wa_sessions:
  wa_media:
  kb_storage:
  doc_storage:
