user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;

    upstream api_backend {
        server api:3000;
        keepalive 32;
    }

    # HTTP server — port 5500 (no SSL required, use for IP-based access)
    server {
        listen 5500;
        server_name _;

        # Health check (no rate limit)
        location /health {
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
        }

        # Auth endpoints — strict rate limit
        location /api/auth/ {
            limit_req zone=auth burst=20 nodelay;
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Socket.io — WebSocket upgrade
        location /socket.io/ {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # All other API routes
        location /api/ {
            limit_req zone=api burst=60 nodelay;
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
        }
    }

    # HTTPS server — uncomment and configure when you have a domain + SSL cert
    # server {
    #     listen 443 ssl http2;
    #     server_name api.YOURDOMAIN.com;
    #
    #     ssl_certificate     /etc/letsencrypt/live/YOURDOMAIN.com/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/YOURDOMAIN.com/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #
    #     location /health { proxy_pass http://api_backend; }
    #     location /api/auth/ { limit_req zone=auth burst=20 nodelay; proxy_pass http://api_backend; proxy_set_header Host $host; }
    #     location /socket.io/ { proxy_pass http://api_backend; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection "upgrade"; proxy_read_timeout 3600s; }
    #     location /api/ { limit_req zone=api burst=60 nodelay; proxy_pass http://api_backend; proxy_set_header Host $host; }
    # }
}
